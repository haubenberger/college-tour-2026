name: Deploy to FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp and sshpass
        run: sudo apt-get install -y lftp sshpass

      - name: Deploy via SFTP (port 22 — bypasses Azure FTP/21 block)
        env:
          FTP_HOST: ftp45.world4you.com
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 4;
            set net:reconnect-interval-base 10;
            open sftp://$FTP_USER:$FTP_PASS@$FTP_HOST;
            mirror --reverse --delete --verbose \
              --exclude-glob .git \
              --exclude-glob .github \
              --exclude-glob deploy.sh \
              --exclude-glob .DS_Store \
              ./ /collegetrip2026/;
            bye
          "
