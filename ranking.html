<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Trip 2026 — Rankings</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="ranking-data.js"></script>
<script src="colleges-list.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#fff;--border:#e0e0e0;--text:#1d1d1f;--sub:#6e6e73;
  --accent:#0071e3;--accent-h:#005bb5;--danger:#ff3b30;--green:#34c759;
  --card-shadow:0 2px 8px rgba(0,0,0,.08);
}
[data-theme=dark]{
  --bg:#000;--surface:#1c1c1e;--border:#3a3a3c;--text:#f5f5f7;--sub:#98989d;
  --accent:#0a84ff;--accent-h:#409cff;--danger:#ff453a;--green:#30d158;
  --card-shadow:0 2px 8px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:17px;font-weight:600;flex:1}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--text)}
.btn-icon:hover{background:var(--border)}
.tabs{display:flex;gap:4px;padding:10px 20px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:8px 16px;border:none;background:none;font-size:14px;font-weight:500;color:var(--sub);border-radius:8px 8px 0 0;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.sidebar h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);margin-bottom:12px}
.budget-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.budget-fill{height:100%;background:var(--accent);transition:width .2s,background .2s;border-radius:4px}
.budget-fill.over{background:var(--danger)}
.budget-label{font-size:12px;color:var(--sub);text-align:right;margin-bottom:14px}
.budget-label.over{color:var(--danger);font-weight:600}
.weight-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.weight-label{flex:1;font-size:13px}
.weight-label.auto{color:var(--sub);font-style:italic}
.weight-ctrl{display:flex;align-items:center;gap:4px}
.weight-ctrl button{width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:14px;color:var(--text);display:flex;align-items:center;justify-content:center}
.weight-ctrl button:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.weight-ctrl button:disabled{opacity:.35;cursor:default}
.weight-val{width:32px;text-align:center;font-size:13px;font-weight:600}
.sidebar-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.btn-reset{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:none;font-size:13px;color:var(--sub)}
.btn-reset:hover{background:var(--border)}
.content{flex:1;overflow-y:auto;padding:20px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-header h2{font-size:20px;font-weight:700;flex:1}
.btn-primary{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500}
.btn-primary:hover{background:var(--accent-h)}
.score-warn{font-size:13px;color:var(--danger);padding:10px 14px;background:rgba(255,59,48,.08);border-radius:8px;margin-bottom:16px}
.school-list{display:flex;flex-direction:column;gap:10px}
.school-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border-radius:14px;box-shadow:var(--card-shadow);border:1px solid var(--border)}
.school-card.unranked{border-style:dashed;opacity:.75}
.rank-badge{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-badge.none{background:var(--border);color:var(--sub);font-size:11px}
.school-info{flex:1;min-width:0}
.school-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.school-sub{font-size:12px;color:var(--sub)}
.school-score{text-align:right;flex-shrink:0}
.score-num{font-size:20px;font-weight:700;color:var(--accent)}
.score-lbl{font-size:11px;color:var(--sub);display:block}
.unranked-tag{font-size:11px;color:var(--danger);font-weight:600}
.card-actions{display:flex;gap:6px;flex-shrink:0}
.btn-rate{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500}
.btn-rate:hover{background:var(--accent-h)}
.btn-rm{padding:6px 8px;background:none;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--sub)}
.btn-rm:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{display:flex;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.modal-head h3{flex:1;font-size:17px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;color:var(--sub);line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:18px 20px;flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:9px 18px;background:none;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text)}
.btn-cancel:hover{background:var(--border)}
.btn-save{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500}
.btn-save:hover{background:var(--accent-h)}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-label{flex:1;font-size:14px;font-weight:500}
.rank-stepper{display:flex;align-items:center;gap:8px}
.rank-stepper button{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--surface);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.rank-stepper button:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.rank-stepper button:disabled{opacity:.3;cursor:default}
.rank-val{width:48px;text-align:center;font-size:14px;font-weight:600}
.rank-clear{font-size:11px;color:var(--sub);cursor:pointer;text-decoration:underline;white-space:nowrap}
.rank-clear:hover{color:var(--danger)}
.computed-box{margin-top:14px;padding:12px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.computed-box .cb-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);margin-bottom:4px}
.computed-box .cb-val{font-size:22px;font-weight:700;color:var(--accent)}
.computed-box .cb-sub{font-size:11px;color:var(--sub)}
.search-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg);color:var(--text);margin-bottom:12px}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-results{max-height:320px;overflow-y:auto}
.search-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px}
.search-item:hover{background:var(--bg)}
.search-item.disabled{opacity:.4;cursor:default}
.si-info{flex:1}
.si-name{font-size:14px;font-weight:500}
.si-sub{font-size:12px;color:var(--sub)}
.si-badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--green);color:#fff;flex-shrink:0}
.si-badge.added{background:var(--border);color:var(--sub)}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.cmp-chip{padding:8px 12px;border:2px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;text-align:center;background:var(--surface)}
.cmp-chip.selected{border-color:var(--accent);background:rgba(0,113,227,.08)}
.chart-wrap{background:var(--surface);border-radius:14px;padding:20px;box-shadow:var(--card-shadow)}
.reco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.reco-card{background:var(--surface);border-radius:14px;padding:16px;box-shadow:var(--card-shadow);border:1px solid var(--border)}
.reco-name{font-size:16px;font-weight:600;margin-bottom:2px}
.reco-loc{font-size:12px;color:var(--sub);margin-bottom:8px}
.reco-bars{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.reco-bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.reco-bar-label{width:90px;color:var(--sub);text-align:right;flex-shrink:0}
.reco-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.reco-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.reco-tagline{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.btn-add-reco{margin-top:10px;width:100%;padding:7px;border:1px solid var(--accent);border-radius:8px;background:none;color:var(--accent);font-size:13px;font-weight:500}
.btn-add-reco:hover{background:var(--accent);color:#fff}
@media(max-width:680px){.main{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>🎓 College Trip 2026</h1>
    <button class="btn-icon" id="btnExport">⬇ CSV</button>
    <button class="btn-icon" id="btnTheme">🌙</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="rankings">Rankings</button>
    <button class="tab" data-tab="compare">Compare</button>
    <button class="tab" data-tab="reco">Recommendations</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <h2>Category Weights</h2>
      <div class="budget-bar"><div class="budget-fill" id="budgetFill"></div></div>
      <div class="budget-label" id="budgetLabel">0 / 100 pts used</div>
      <div id="weightsPanel"></div>
      <div class="sidebar-footer">
        <button class="btn-reset" id="btnResetWeights">Reset to defaults</button>
      </div>
    </div>
    <div class="content">
      <div id="tab-rankings">
        <div class="section-header">
          <h2>My Rankings</h2>
          <button class="btn-primary" id="btnAddSchool">+ Add School</button>
        </div>
        <div id="scoreWarn" class="score-warn" style="display:none"></div>
        <div class="school-list" id="schoolList"></div>
      </div>
      <div id="tab-compare" style="display:none">
        <h2 style="margin-bottom:14px">Compare Schools</h2>
        <div class="compare-grid" id="cmpGrid"></div>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div id="tab-reco" style="display:none">
        <h2 style="margin-bottom:14px">Recommended Schools</h2>
        <div class="reco-grid" id="recoGrid"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="rateModal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <h3 id="rateModalTitle">Rate School</h3>
      <button class="modal-close" id="rateModalClose">✕</button>
    </div>
    <div class="modal-body" id="rateModalBody"></div>
    <div class="modal-foot">
      <button class="btn-cancel" id="rateModalCancel">Cancel</button>
      <button class="btn-save" id="rateModalSave">Save</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="addModal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <h3>Add a School</h3>
      <button class="modal-close" id="addModalClose">✕</button>
    </div>
    <div class="modal-body">
      <input class="search-input" id="schoolSearch" placeholder="Search colleges…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'ranking_v3';
const USER_CATS = window.RD.categories.filter(c => c.key !== 'objectiveMetrics');
const ALL_CATS  = window.RD.categories;
let S = { weights: {}, schools: [] };

function defaultWeights() {
  const w = {};
  ALL_CATS.forEach(c => { w[c.key] = c.defaultWeight; });
  return w;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { S = JSON.parse(raw); return; }
  } catch(e) {}
  S.weights = defaultWeights();
  S.schools = window.RD.colleges.map(c => ({
    id: c.id, name: c.name, location: c.location, type: c.type,
    metrics: c.metrics || {}, rankings: {}
  }));
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(S)); }

const LOWER_BETTER = new Set(['sfRatio','acceptRate','avgDebt']);

function computeObjectiveRanks() {
  const schools = S.schools.filter(s => s.metrics && Object.keys(s.metrics).length > 0);
  if (schools.length < 2) {
    S.schools.forEach(s => { s._objScore = null; delete s.rankings.objectiveMetrics; });
    return;
  }
  const keys = Object.keys(window.RD.metricsWeights).filter(k => k !== 'roi');
  const composites = schools.map(s => {
    let total = 0, wt = 0;
    keys.forEach(k => {
      const val = s.metrics[k];
      if (val == null) return;
      wt += window.RD.metricsWeights[k];
      total += val * window.RD.metricsWeights[k] * (LOWER_BETTER.has(k) ? -1 : 1);
    });
    return { s, raw: wt ? total / wt : 0 };
  });
  composites.sort((a,b) => b.raw - a.raw);
  composites.forEach((c, i) => {
    c.s.rankings.objectiveMetrics = i + 1;
    c.s._objScore = +((((composites.length - 1 - i) / Math.max(composites.length - 1, 1)) * 10).toFixed(1));
  });
  S.schools.filter(s => !s.metrics || !Object.keys(s.metrics).length).forEach(s => {
    delete s.rankings.objectiveMetrics;
    s._objScore = null;
  });
}

function wSum() { return ALL_CATS.reduce((t,c) => t + (S.weights[c.key]||0), 0); }

function scoreSchool(s) {
  const n = S.schools.length;
  if (n < 2 || wSum() !== 100) return null;
  if (!ALL_CATS.every(c => s.rankings[c.key] != null)) return null;
  let score = 0;
  ALL_CATS.forEach(c => {
    score += ((n - s.rankings[c.key]) / (n - 1)) * 100 * ((S.weights[c.key]||0) / 100);
  });
  return Math.round(score);
}

function overallRank() {
  const scored = S.schools.map(s => ({s, sc: scoreSchool(s)})).filter(x => x.sc != null);
  scored.sort((a,b) => b.sc - a.sc);
  const map = {};
  scored.forEach((x,i) => { map[x.s.id] = i + 1; });
  return map;
}

function renderWeights() {
  const used = wSum();
  document.getElementById('budgetFill').style.width = Math.min(used,100)+'%';
  document.getElementById('budgetFill').classList.toggle('over', used > 100);
  const lbl = document.getElementById('budgetLabel');
  lbl.textContent = used+' / 100 pts used';
  lbl.classList.toggle('over', used > 100);
  const panel = document.getElementById('weightsPanel');
  panel.innerHTML = '';
  ALL_CATS.forEach(c => {
    const isAuto = c.key === 'objectiveMetrics';
    const val = S.weights[c.key]||0;
    const row = document.createElement('div');
    row.className = 'weight-row';
    if (isAuto) {
      row.innerHTML = `<span class="weight-label auto">${c.label}</span><div class="weight-ctrl"><span class="weight-val">${val}</span></div>`;
    } else {
      row.innerHTML = `<span class="weight-label">${c.label}</span><div class="weight-ctrl"><button class="w-minus" data-key="${c.key}">−</button><span class="weight-val">${val}</span><button class="w-plus" data-key="${c.key}">+</button></div>`;
      row.querySelector('.w-minus').disabled = val <= 0;
      row.querySelector('.w-plus').disabled = used >= 100;
    }
    panel.appendChild(row);
  });
}

document.getElementById('weightsPanel').addEventListener('click', e => {
  const plus = e.target.closest('.w-plus'), minus = e.target.closest('.w-minus');
  const key = (plus||minus)?.dataset.key;
  if (!key) return;
  const cur = S.weights[key]||0;
  if (plus && wSum() < 100) S.weights[key] = cur + 1;
  else if (minus && cur > 0) S.weights[key] = cur - 1;
  else return;
  computeObjectiveRanks(); save(); renderWeights(); renderSchoolList();
});

document.getElementById('btnResetWeights').addEventListener('click', () => {
  S.weights = defaultWeights(); save(); renderWeights(); renderSchoolList();
});

function renderSchoolList() {
  const ws = wSum();
  const warn = document.getElementById('scoreWarn');
  if (ws !== 100) {
    warn.style.display = '';
    warn.textContent = ws < 100
      ? `Weights sum to ${ws}/100 — assign ${100-ws} more point${100-ws!==1?'s':''} to see scores.`
      : `Weights sum to ${ws}/100 — over budget by ${ws-100}. Scores hidden.`;
  } else { warn.style.display = 'none'; }

  const ranks = overallRank();
  const sorted = [...S.schools].sort((a,b) => {
    const ra=ranks[a.id], rb=ranks[b.id];
    if (ra!=null&&rb!=null) return ra-rb;
    if (ra!=null) return -1; if (rb!=null) return 1; return 0;
  });
  const list = document.getElementById('schoolList');
  list.innerHTML = '';
  sorted.forEach(s => {
    const score = scoreSchool(s), rank = ranks[s.id];
    const allRanked = USER_CATS.every(c => s.rankings[c.key] != null);
    const card = document.createElement('div');
    card.className = 'school-card' + (allRanked ? '' : ' unranked');
    const missing = USER_CATS.filter(c => s.rankings[c.key]==null).length;
    card.innerHTML = `
      ${rank!=null ? `<div class="rank-badge">#${rank}</div>` : `<div class="rank-badge none">—</div>`}
      <div class="school-info"><div class="school-name">${s.name}</div><div class="school-sub">${s.location} · ${s.type}</div></div>
      ${rank!=null ? `<div class="school-score"><span class="score-num">${score}</span><span class="score-lbl">score</span></div>` : `<div class="school-score"><span class="unranked-tag">${missing} unrated</span></div>`}
      <div class="card-actions">
        <button class="btn-rate" data-edit="${s.id}">✏ Rate</button>
        <button class="btn-rm" data-rm="${s.id}">✕</button>
      </div>`;
    list.appendChild(card);
  });
}

document.getElementById('schoolList').addEventListener('click', e => {
  const edit = e.target.closest('[data-edit]')?.dataset.edit;
  const rm = e.target.closest('[data-rm]')?.dataset.rm;
  if (edit) openRateModal(edit);
  if (rm) { S.schools = S.schools.filter(s => s.id !== rm); computeObjectiveRanks(); save(); renderSchoolList(); renderCompare(); }
});

let editId = null, draftRankings = {};

function openRateModal(id) {
  const s = S.schools.find(x => x.id === id);
  if (!s) return;
  editId = id;
  draftRankings = Object.assign({}, s.rankings);
  document.getElementById('rateModalTitle').textContent = s.name;
  renderRateModalBody();
  document.getElementById('rateModal').style.display = 'flex';
}

function renderRateModalBody() {
  const body = document.getElementById('rateModalBody');
  const n = S.schools.length;
  body.innerHTML = '';
  USER_CATS.forEach(c => {
    const rank = draftRankings[c.key];
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-label">${c.label}</span>
      <div class="rank-stepper">
        <button class="rm-step" data-cat="${c.key}">−</button>
        <span class="rank-val">${rank!=null?'#'+rank:'—'}</span>
        <button class="rp-step" data-cat="${c.key}">+</button>
      </div>
      <span class="rank-clear" data-clear="${c.key}">clear</span>`;
    row.querySelector('.rm-step').disabled = rank==null||rank<=1;
    row.querySelector('.rp-step').disabled = rank!=null&&rank>=n;
    body.appendChild(row);
  });
  const s = S.schools.find(x => x.id === editId);
  const box = document.createElement('div');
  box.className = 'computed-box';
  box.innerHTML = `<div class="cb-title">Objective Metrics (auto-computed)</div><div class="cb-val">${s?.rankings?.objectiveMetrics!=null?'#'+s.rankings.objectiveMetrics:'N/A'}</div><div class="cb-sub">${s?._objScore!=null?'Score: '+s._objScore+' / 10':'Not enough data'}</div>`;
  body.appendChild(box);
}

document.getElementById('rateModalBody').addEventListener('click', e => {
  const plus=e.target.closest('.rp-step'), minus=e.target.closest('.rm-step'), clear=e.target.closest('[data-clear]');
  const n = S.schools.length;
  if (plus) {
    const cat=plus.dataset.cat, cur=draftRankings[cat];
    draftRankings[cat] = cur==null ? 1 : Math.min(cur+1,n);
    renderRateModalBody();
  } else if (minus) {
    const cat=minus.dataset.cat, cur=draftRankings[cat];
    if (cur==null) return;
    if (cur<=1) delete draftRankings[cat]; else draftRankings[cat]=cur-1;
    renderRateModalBody();
  } else if (clear) {
    delete draftRankings[clear.dataset.clear];
    renderRateModalBody();
  }
});

document.getElementById('rateModalSave').addEventListener('click', () => {
  const s = S.schools.find(x => x.id === editId);
  if (s) USER_CATS.forEach(c => {
    if (draftRankings[c.key]!=null) s.rankings[c.key]=draftRankings[c.key];
    else delete s.rankings[c.key];
  });
  computeObjectiveRanks(); save(); renderSchoolList(); renderCompare();
  document.getElementById('rateModal').style.display = 'none';
});

['rateModalClose','rateModalCancel'].forEach(id => {
  document.getElementById(id).addEventListener('click', () => { document.getElementById('rateModal').style.display='none'; });
});

document.getElementById('btnAddSchool').addEventListener('click', () => {
  document.getElementById('schoolSearch').value = '';
  renderSearchResults('');
  document.getElementById('addModal').style.display = 'flex';
  setTimeout(() => document.getElementById('schoolSearch').focus(), 50);
});

document.getElementById('schoolSearch').addEventListener('input', e => renderSearchResults(e.target.value));
document.getElementById('addModalClose').addEventListener('click', () => { document.getElementById('addModal').style.display='none'; });

function renderSearchResults(query) {
  const q = query.trim().toLowerCase();
  const pool = window.COLLEGE_LIST || [];
  const filtered = q ? pool.filter(c => c.name.toLowerCase().includes(q)||(c.location||'').toLowerCase().includes(q)) : pool.slice(0,60);
  const existing = new Set(S.schools.map(s => s.id));
  const res = document.getElementById('searchResults');
  res.innerHTML = '';
  if (!filtered.length) { res.innerHTML='<div style="padding:20px;text-align:center;color:var(--sub)">No results</div>'; return; }
  filtered.slice(0,80).forEach(c => {
    const isAdded = existing.has(c.id);
    const item = document.createElement('div');
    item.className = 'search-item'+(isAdded?' disabled':'');
    item.innerHTML = `<div class="si-info"><div class="si-name">${c.name}</div><div class="si-sub">${c.location||''} · ${c.type||''}</div></div><span class="si-badge${isAdded?' added':''}">${isAdded?'Added':'+ Add'}</span>`;
    if (!isAdded) item.addEventListener('click', () => addSchool(c));
    res.appendChild(item);
  });
}

function addSchool(c) {
  if (S.schools.find(s => s.id===c.id)) return;
  const rdEntry = (window.RD.colleges||[]).find(r => r.id===c.id);
  S.schools.push({id:c.id,name:c.name,location:c.location||'',type:c.type||'',metrics:rdEntry?.metrics||{},rankings:{}});
  computeObjectiveRanks(); save(); renderSchoolList();
  renderSearchResults(document.getElementById('schoolSearch').value);
  renderCompare();
}

let selectedForCompare = [], radarChart = null;

function renderCompare() {
  if (document.getElementById('tab-compare').style.display==='none') return;
  selectedForCompare = selectedForCompare.filter(id => S.schools.find(s=>s.id===id));
  const grid = document.getElementById('cmpGrid');
  grid.innerHTML = '';
  S.schools.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'cmp-chip'+(selectedForCompare.includes(s.id)?' selected':'');
    chip.textContent = s.name;
    chip.addEventListener('click', () => {
      if (selectedForCompare.includes(s.id)) selectedForCompare=selectedForCompare.filter(x=>x!==s.id);
      else if (selectedForCompare.length<6) selectedForCompare.push(s.id);
      renderCompare();
    });
    grid.appendChild(chip);
  });
  drawRadar();
}

function drawRadar() {
  const ctx = document.getElementById('radarChart').getContext('2d');
  if (radarChart) { radarChart.destroy(); radarChart=null; }
  const sel = S.schools.filter(s => selectedForCompare.includes(s.id));
  if (!sel.length) return;
  const n = S.schools.length;
  const colors = ['#0071e3','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa'];
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ALL_CATS.map(c=>c.label),
      datasets: sel.map((s,i) => ({
        label: s.name,
        data: ALL_CATS.map(c => {
          const r=s.rankings[c.key]; if(r==null||n<2) return 0;
          return Math.round(((n-r)/(n-1))*10);
        }),
        borderColor: colors[i%colors.length],
        backgroundColor: colors[i%colors.length]+'22',
        pointBackgroundColor: colors[i%colors.length],
      }))
    },
    options:{responsive:true,scales:{r:{min:0,max:10,ticks:{stepSize:2}}},plugins:{legend:{position:'bottom'}}}
  });
}

function renderReco() {
  const grid = document.getElementById('recoGrid');
  grid.innerHTML = '';
  const existing = new Set(S.schools.map(s=>s.name));
  window.RD.recommendations.forEach(r => {
    const card = document.createElement('div');
    card.className = 'reco-card';
    const bars = Object.keys(r.profile).map(k => {
      const cat=ALL_CATS.find(c=>c.key===k); if(!cat) return '';
      return `<div class="reco-bar-row"><span class="reco-bar-label">${cat.label}</span><div class="reco-bar-track"><div class="reco-bar-fill" style="width:${r.profile[k]*10}%"></div></div><span style="font-size:11px;color:var(--sub);width:14px">${r.profile[k]}</span></div>`;
    }).join('');
    const added = existing.has(r.name);
    card.innerHTML = `<div class="reco-name">${r.name}</div><div class="reco-loc">${r.location} · ${r.type}</div><div class="reco-bars">${bars}</div><div class="reco-tagline">${r.tagline}</div>${added?'<div style="margin-top:10px;font-size:12px;color:var(--sub)">Already in your list</div>':`<button class="btn-add-reco" data-reco-name="${r.name}">+ Add to Rankings</button>`}`;
    grid.appendChild(card);
  });
}

document.getElementById('recoGrid').addEventListener('click', e => {
  const btn = e.target.closest('[data-reco-name]');
  if (!btn) return;
  const r = window.RD.recommendations.find(x=>x.name===btn.dataset.recoName);
  if (!r) return;
  const id = r.name.toLowerCase().replace(/[^a-z0-9]/g,'');
  if (S.schools.find(s=>s.id===id||s.name===r.name)) return;
  S.schools.push({id,name:r.name,location:r.location,type:r.type,metrics:{},rankings:{}});
  computeObjectiveRanks(); save(); renderSchoolList(); renderReco();
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-rankings').style.display = tab==='rankings'?'':'none';
    document.getElementById('tab-compare').style.display  = tab==='compare'?'':'none';
    document.getElementById('tab-reco').style.display     = tab==='reco'?'':'none';
    if (tab==='compare') renderCompare();
    if (tab==='reco') renderReco();
  });
});

const ThemeBtn = document.getElementById('btnTheme');
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  ThemeBtn.textContent = dark?'☀️':'🌙';
  localStorage.setItem('theme', dark?'dark':'light');
}
ThemeBtn.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme')!=='dark'));

document.getElementById('btnExport').addEventListener('click', () => {
  const ranks=overallRank();
  const rows=[['School','Location','Overall Rank','Score',...ALL_CATS.map(c=>c.label)]];
  S.schools.forEach(s => rows.push([s.name,s.location,ranks[s.id]||'',scoreSchool(s)||'',...ALL_CATS.map(c=>s.rankings[c.key]||'')]));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='college-rankings.csv'; a.click();
});

['rateModal','addModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if(e.target===document.getElementById(id)) document.getElementById(id).style.display='none'; });
});

const savedTheme=localStorage.getItem('theme');
if (savedTheme) applyTheme(savedTheme==='dark');
else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);

loadState();
computeObjectiveRanks();
save();
renderWeights();
renderSchoolList();
</script>
</body>
</html>
